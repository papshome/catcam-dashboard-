<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>CatCam — Timeline</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            cream:  { 50: '#FDFBF7', 100: '#FAF7F2', 200: '#F2EDE4', 300: '#E8E1D3' },
            ink:    { 900: '#1F1B16', 700: '#4A433A', 500: '#7A7368', 400: '#9A9285' },
            calm:   { 50: '#EEF4EF', 200: '#C9DDCC', 500: '#7BA889', 700: '#4F7A5D' },
            amber2: { 50: '#FBF3E4', 200: '#F0DDB0', 500: '#D9A95E', 700: '#A17526' },
            rose:   { 500: '#C86C6C', 700: '#8C4343' },
          },
        },
      },
    };
  </script>

  <style>
    html, body { background: #FAF7F2; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #1F1B16; -webkit-font-smoothing: antialiased; }
    .viewport { max-width: 440px; margin: 0 auto; min-height: 100vh; }

    /* ---- Header (identique home) ---- */
    .brand-logo { height: 32px; width: auto; display: block; user-select: none; }
    .fountain-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 11px 6px 9px;
      background: #F2EDE4; border: 1px solid #E8E1D3;
      border-radius: 999px;
      font-size: 12px; font-weight: 700; color: #1F1B16;
    }
    .fountain-pill .drop { width: 14px; height: 14px; flex-shrink: 0; color: #7BA889; }
    .fountain-pill.low    .drop { color: #D9A95E; }
    .fountain-pill.empty  .drop { color: #C86C6C; }
    .fountain-pill.low    { background: #FBF3E4; border-color: #F0DDB0; color: #A17526; }
    .fountain-pill.empty  { background: #F6E2E2; border-color: #EBC5C5; color: #8C4343; }
    .avatar-btn {
      width: 44px; height: 44px; border-radius: 999px;
      background: #F2EDE4; display: flex; align-items: center; justify-content: center;
      color: #4A433A; flex-shrink: 0; border: 1px solid #E8E1D3;
    }
    .avatar-btn:hover { background: #E8E1D3; }

    /* ---- Page title ---- */
    .page-title { font-size: 22px; font-weight: 700; color: #1F1B16; letter-spacing: -0.02em; }
    .page-sub   { font-size: 12px; color: #7A7368; margin-top: 2px; }

    /* ---- Day group ---- */
    .day-group { margin-bottom: 18px; }
    .day-head  {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0 4px; margin-bottom: 8px;
    }
    .day-label {
      font-size: 11px; font-weight: 700; color: #9A9285;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .day-count { font-size: 11px; color: #9A9285; font-weight: 500; }

    .day-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(31,27,22,.03), 0 4px 12px rgba(31,27,22,.04);
    }
    .session-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px 10px 12px;
      cursor: pointer;
      transition: background-color .12s ease;
      color: inherit; background: transparent; border: 0;
      width: 100%; text-align: left;
    }
    .session-row + .session-row { border-top: 1px solid #F2EDE4; }
    .session-row:hover  { background: #FAF7F2; }
    .session-row:active { background: #F2EDE4; }
    .session-time {
      font-size: 13px; font-weight: 700; color: #1F1B16;
      font-variant-numeric: tabular-nums;
      width: 44px; flex-shrink: 0;
      letter-spacing: -0.01em;
    }
    .session-avatar {
      width: 38px; height: 38px; border-radius: 999px;
      background-size: cover; background-position: center; background-color: #F2EDE4;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px #E8E1D3;
      display: flex; align-items: center; justify-content: center;
      color: #7A7368; font-weight: 700; font-size: 14px;
    }
    .session-body { flex: 1; min-width: 0; }
    .session-name { font-size: 14px; font-weight: 600; color: #1F1B16; line-height: 1.2; }
    .session-meta { font-size: 11.5px; color: #7A7368; margin-top: 2px; }
    .session-meta b { color: #4A433A; font-weight: 600; }
    .session-chev { color: #BCB3A4; flex-shrink: 0; }
    .session-row.incertain .session-name::after {
      content: '?'; display: inline-block;
      margin-left: 6px;
      background: #FBF3E4; color: #A17526;
      border-radius: 4px; padding: 0 5px;
      font-size: 10px; font-weight: 700;
      vertical-align: 1px;
    }

    .empty-state {
      padding: 40px 20px; text-align: center;
      color: #7A7368; font-size: 13px;
    }

    /* ---- Bottom sheet modal ---- */
    .sheet-container {
      position: fixed; inset: 0; z-index: 60;
      display: flex; justify-content: center;
      pointer-events: none;
    }
    .sheet-backdrop {
      position: absolute; inset: 0;
      background: rgba(31,27,22,0.50);
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
    }
    .sheet-container.open .sheet-backdrop { opacity: 1; pointer-events: auto; }
    .sheet {
      position: relative; align-self: flex-end;
      width: 100%; max-width: 440px;
      max-height: 92vh;
      background: #fff;
      border-radius: 28px 28px 0 0;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: none;
      box-shadow: 0 -8px 32px rgba(31,27,22,.15);
    }
    .sheet-container.open .sheet { transform: translateY(0); pointer-events: auto; }
    .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: #E8E1D3;
      margin: 8px auto 0;
    }

    .sheet-head {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px 6px;
    }
    .sheet-back {
      width: 34px; height: 34px; border-radius: 999px;
      background: #F2EDE4; border: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #4A433A; flex-shrink: 0;
    }
    .sheet-back:hover { background: #E8E1D3; }
    .sheet-head-text { flex: 1; min-width: 0; }
    .sheet-title    { font-size: 16px; font-weight: 700; color: #1F1B16; letter-spacing: -0.01em; }
    .sheet-subtitle { font-size: 12px; color: #7A7368; margin-top: 1px; }
    .cert-badge {
      padding: 3px 9px; border-radius: 999px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .cert-badge.high { background: #EEF4EF; color: #4F7A5D; }
    .cert-badge.med  { background: #FBF3E4; color: #A17526; }
    .cert-badge.low  { background: #F6E2E2; color: #8C4343; }

    .sheet-body { padding: 10px 18px 22px; }

    .timelapse-wrap {
      width: 100%; aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #1F1B16;
      display: flex; align-items: center; justify-content: center;
      color: #7A7368;
      position: relative;
    }
    .timelapse-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .timelapse-duration {
      position: absolute; bottom: 10px; right: 10px;
      padding: 3px 8px; border-radius: 6px;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 11px; font-weight: 600;
    }

    .sheet-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      padding: 16px 0;
    }
    .sheet-stat { text-align: center; padding: 4px 4px; }
    .sheet-stat + .sheet-stat { border-left: 1px solid #F2EDE4; }
    .sheet-stat-value {
      font-size: 22px; font-weight: 700; color: #1F1B16;
      letter-spacing: -0.02em; line-height: 1;
    }
    .sheet-stat-value .u { font-size: 12px; font-weight: 500; color: #7A7368; margin-left: 2px; }
    .sheet-stat-label {
      font-size: 10.5px; color: #9A9285; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-top: 6px;
    }

    .weight-card {
      background: #FAF7F2;
      border: 1px solid #F2EDE4;
      border-radius: 18px;
      padding: 14px 16px 12px;
    }
    .weight-card-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .weight-card-title { font-size: 13px; font-weight: 700; color: #1F1B16; letter-spacing: -0.01em; }
    .weight-card-dur   { font-size: 11px; font-weight: 600; color: #4F7A5D; }
    .weight-chart { position: relative; height: 170px; }
    .weight-chart svg { width: 100%; height: 100%; display: block; }
    .weight-legend {
      display: flex; flex-wrap: wrap; gap: 10px 14px;
      margin-top: 8px;
      font-size: 10.5px; color: #7A7368; font-weight: 500;
    }
    .weight-legend .item { display: inline-flex; align-items: center; gap: 6px; }
    .weight-legend .swatch {
      flex-shrink: 0;
    }
    .weight-legend .swatch.line   { width: 14px; height: 2px; border-radius: 1px; }
    .weight-legend .swatch.zone   { width: 10px; height: 10px; border-radius: 3px; background: rgba(79,122,93,0.2); border: 1px dashed #4F7A5D; }

    .validation-card {
      background: #FAF7F2;
      border: 1px solid #F2EDE4;
      border-radius: 18px;
      padding: 14px 16px;
      margin-top: 16px;
    }
    .validation-q {
      font-size: 13px; color: #1F1B16; font-weight: 600; text-align: center;
      margin-bottom: 10px;
    }
    .validation-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .vbtn {
      padding: 10px; border-radius: 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: #fff; border: 1px solid #E8E1D3; color: #1F1B16;
      transition: background .12s, border-color .12s;
    }
    .vbtn:hover { background: #F2EDE4; }
    .vbtn.primary   { background: #7BA889; border-color: #7BA889; color: #fff; }
    .vbtn.primary:hover { background: #4F7A5D; }
    .vbtn.amber     { background: #D9A95E; border-color: #D9A95E; color: #fff; }
    .vbtn.amber:hover { background: #A17526; }
    .vbtn:disabled  { opacity: 0.5; cursor: not-allowed; }

    .validation-done {
      background: #EEF4EF; border-color: #C9DDCC;
      text-align: center;
    }
    .validation-done .title { font-size: 14px; font-weight: 700; color: #4F7A5D; }
    .validation-done .sub   { font-size: 12px; color: #4A433A; margin-top: 4px; }

    /* ---- Bottom nav ---- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: linear-gradient(to top, rgba(250,247,242,.95) 55%, rgba(250,247,242,0));
      pointer-events: none;
    }
    .bottom-nav-inner {
      max-width: 440px; margin: 0 auto;
      padding: 10px 16px 16px;
      pointer-events: auto;
    }
    .bottom-nav-bar {
      background: #fff; border: 1px solid #F2EDE4;
      border-radius: 28px;
      box-shadow: 0 2px 6px rgba(31,27,22,.05), 0 14px 32px rgba(31,27,22,.07);
      padding: 8px 6px;
      display: flex; align-items: center; justify-content: space-around;
    }
    .bottom-nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 6px 4px; color: #9A9285; background: transparent; border: 0; cursor: pointer;
      border-radius: 18px; transition: color .15s ease, background-color .15s ease;
      text-decoration: none;
    }
    .bottom-nav-btn:hover:not([disabled]) { color: #4A433A; }
    .bottom-nav-btn span { font-size: 10.5px; margin-top: 4px; font-weight: 500; }
    .bottom-nav-btn.active { color: #1F1B16; background: #FAF7F2; }
    .bottom-nav-btn.active span { font-weight: 700; }
    .bottom-nav-btn.active svg { stroke-width: 2.4; }
  </style>
</head>

<body>

  <div class="viewport pb-28">

    <!-- Header -->
    <header class="px-5 pt-6 pb-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="./index.html"><img src="./assets/logo.png" alt="PurrSense" class="brand-logo" /></a>
        <div id="fountain-pill" class="fountain-pill" style="display:none;">
          <svg class="drop" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2.5c-.4 0-.77.18-1.02.5C8.9 5.58 4 12 4 15.5a8 8 0 0 0 16 0c0-3.5-4.9-9.92-6.98-12.5A1.3 1.3 0 0 0 12 2.5z"/>
          </svg>
          <span id="fountain-pct-text">--%</span>
        </div>
      </div>
      <button class="avatar-btn" aria-label="Reglages">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 22c0-4 4-7 8-7s8 3 8 7"></path>
        </svg>
      </button>
    </header>

    <!-- Title -->
    <section class="px-5 pb-4">
      <h1 class="page-title">Timeline</h1>
      <p class="page-sub" id="tl-sub">14 derniers jours</p>
    </section>

    <!-- Timeline list -->
    <section class="px-5" id="timeline-list">
      <div class="empty-state">Chargement...</div>
    </section>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <div class="bottom-nav-bar">
        <a class="bottom-nav-btn" href="./index.html" aria-label="Accueil">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 0-2-2h0a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <span>Accueil</span>
        </a>
        <a class="bottom-nav-btn" href="./chat.html?id=papouille" aria-label="Chats">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          <span>Chats</span>
        </a>
        <button class="bottom-nav-btn active" aria-label="Timeline">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Timeline</span>
        </button>
        <button class="bottom-nav-btn" aria-label="Reglages" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m10 0h6M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg>
          <span>Reglages</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Bottom sheet : detail session -->
  <div id="sheet-container" class="sheet-container" aria-hidden="true">
    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <div id="sheet-content">
        <!-- injecte par timeline.js -->
      </div>
    </div>
  </div>

  <script src="./timeline.js"></script>
</body>
</html>
