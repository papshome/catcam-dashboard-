<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatCam - Hydratation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    margin-bottom: 4px;
    color: #e94560;
    font-size: 1.8em;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 24px;
    font-size: 0.85em;
  }

  /* Alertes */
  .alerts { margin-bottom: 20px; }
  .alert {
    background: #1a1a2e;
    border-left: 4px solid #f44336;
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .alert-info { border-left-color: #ffc107; }
  .alert-ok { border-left-color: #4caf50; }
  .alert-icon {
    width: 8px; height: 8px; border-radius: 50%;
    background: #f44336;
    animation: pulse 1.5s infinite;
  }
  .alert-info .alert-icon { background: #ffc107; animation: none; }
  .alert-ok .alert-icon { background: #4caf50; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* Two columns par chat */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
  }

  .col {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 18px;
    border: 1px solid #2a2a4a;
  }
  .col h2 {
    margin-bottom: 14px;
    font-size: 1.15em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .col-papouille h2 { color: #4fc3f7; }
  .col-tigrou h2 { color: #ffb74d; }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .card {
    background: #16213e;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .card .value {
    font-size: 1.4em;
    font-weight: bold;
  }
  .card .label {
    color: #888;
    margin-top: 4px;
    font-size: 0.75em;
  }
  .val-papouille { color: #4fc3f7; }
  .val-tigrou { color: #ffb74d; }
  .val-green { color: #4caf50; }
  .val-yellow { color: #ffc107; }
  .val-red { color: #f44336; }
  .last-visit {
    grid-column: 1 / -1;
    color: #888;
    text-align: center;
    margin-top: 6px;
    font-size: 0.8em;
  }

  /* Section graphique */
  section {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
    border: 1px solid #2a2a4a;
  }
  section h2 {
    color: #e94560;
    margin-bottom: 12px;
    font-size: 1.1em;
  }
  canvas { max-height: 280px; }
  .legend {
    text-align: center;
    margin-bottom: 10px;
    font-size: 0.8em;
    color: #888;
  }
  .legend-box {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78em;
  }
  th {
    background: #16213e;
    color: #e94560;
    padding: 8px 6px;
    text-align: left;
    position: sticky;
    top: 0;
  }
  td {
    padding: 6px;
    border-bottom: 1px solid #2a2a4a;
  }
  .table-wrap { max-height: 350px; overflow-y: auto; }
  .cat-tag {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.85em;
    font-weight: 600;
  }
  .cat-papouille { background: #4fc3f722; color: #4fc3f7; }
  .cat-tigrou { background: #ffb74d22; color: #ffb74d; }
  .cat-erreur { background: #88888822; color: #888; }

  .loading {
    text-align: center;
    padding: 40px;
    color: #888;
  }
  .error-msg {
    background: #f4433622;
    border-left: 4px solid #f44336;
    padding: 12px;
    border-radius: 6px;
    margin: 16px 0;
    color: #ff8a80;
  }
</style>
</head>
<body>

<h1>CatCam Hydratation</h1>
<p class="subtitle" id="subtitle">Chargement...</p>

<div id="alertsContainer" class="alerts"></div>

<div id="content" style="display:none;">

<div class="two-col">
  <div class="col col-papouille">
    <h2>Papouille (7.0 kg)</h2>
    <div class="cards">
      <div class="card"><div class="value val-papouille" id="papWater">-</div><div class="label">Eau 7j</div></div>
      <div class="card"><div class="value val-papouille" id="papVisits">-</div><div class="label">Visites/jour</div></div>
      <div class="card"><div class="value val-papouille" id="papDur">-</div><div class="label">Duree moy.</div></div>
      <div class="card"><div class="value" id="papMlKg">-</div><div class="label">ml/kg/jour</div></div>
      <div class="last-visit" id="papLast"></div>
    </div>
  </div>
  <div class="col col-tigrou">
    <h2>Tigrou (4.2 kg)</h2>
    <div class="cards">
      <div class="card"><div class="value val-tigrou" id="tigWater">-</div><div class="label">Eau 7j</div></div>
      <div class="card"><div class="value val-tigrou" id="tigVisits">-</div><div class="label">Visites/jour</div></div>
      <div class="card"><div class="value val-tigrou" id="tigDur">-</div><div class="label">Duree moy.</div></div>
      <div class="card"><div class="value" id="tigMlKg">-</div><div class="label">ml/kg/jour</div></div>
      <div class="last-visit" id="tigLast"></div>
    </div>
  </div>
</div>

<section>
  <h2>Eau bue par jour (7 derniers jours)</h2>
  <div class="legend">
    <span><span class="legend-box" style="background:#4fc3f7"></span>Papouille</span>
    &nbsp;&nbsp;
    <span><span class="legend-box" style="background:#ffb74d"></span>Tigrou</span>
  </div>
  <canvas id="waterDailyChart"></canvas>
</section>

<section>
  <h2>Sessions recentes</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Heure</th><th>Chat</th><th>Duree</th><th>Eau</th><th>Conf.</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</section>

</div>

<script>
// ===========================================
// CONFIG SUPABASE
// ===========================================
const SUPABASE_URL = 'https://pnkultqeijguvthjrehx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBua3VsdHFlaWpndXZ0aGpyZWh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NDE4NjYsImV4cCI6MjA4NTMxNzg2Nn0.TrD_cGc-VLBfBsMVXg2rInM2LPjLyhXxZFBjHJ2MB_8';

// Poids des chats (kg) pour calculs ml/kg/jour
const CAT_WEIGHTS = {
  papouille: 7.0,
  tigrou: 4.2,
};

// Seuils ml/kg/jour
const HYDRATION_NORMAL_LOW  = 40;
const HYDRATION_NORMAL_HIGH = 60;
const HYDRATION_VIGILANCE   = 80;

const PAP = '#4fc3f7';
const TIG = '#ffb74d';
const gridColor = '#2a2a4a';
const tickColor = '#888';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===========================================
// LOAD + DISPLAY
// ===========================================

function formatDuration(seconds) {
  if (!seconds || seconds < 0) return '-';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  if (m === 0) return `${s}s`;
  return `${m}m${s.toString().padStart(2, '0')}s`;
}

function formatDateTime(iso) {
  const d = new Date(iso);
  return {
    date: d.toISOString().slice(0, 10),
    time: d.toTimeString().slice(0, 5),
  };
}

function hydrationColor(mlKg) {
  if (mlKg >= HYDRATION_VIGILANCE) return 'val-red';
  if (mlKg >= HYDRATION_NORMAL_HIGH) return 'val-yellow';
  if (mlKg >= HYDRATION_NORMAL_LOW) return 'val-green';
  return 'val-yellow';
}

function showError(msg) {
  document.getElementById('subtitle').textContent = 'Erreur de chargement';
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-msg';
  errorDiv.textContent = msg;
  document.getElementById('alertsContainer').appendChild(errorDiv);
}

async function loadSessions() {
  const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

  const { data, error } = await sb
    .from('sessions')
    .select('*')
    .gte('start_time', sevenDaysAgo)
    .order('start_time', { ascending: false });

  if (error) {
    showError(`Supabase: ${error.message}`);
    return;
  }

  if (!data || data.length === 0) {
    showError('Aucune session trouvee dans les 7 derniers jours');
    return;
  }

  renderDashboard(data);
}

function renderDashboard(sessions) {
  // Filtrer les erreurs balance pour les stats
  const valid = sessions.filter(s => !s.is_error && s.cat !== 'erreur' && s.cat !== 'incertain');

  // Stats par chat
  const stats = computeStats(valid, 'papouille');
  const stats2 = computeStats(valid, 'tigrou');

  // Cards Papouille
  document.getElementById('papWater').textContent = `${Math.round(stats.totalWater)}g`;
  document.getElementById('papVisits').textContent = stats.visitsPerDay.toFixed(1);
  document.getElementById('papDur').textContent = formatDuration(stats.avgDuration);
  const papMl = document.getElementById('papMlKg');
  papMl.textContent = stats.mlKgDay.toFixed(1);
  papMl.classList.add(hydrationColor(stats.mlKgDay));
  document.getElementById('papLast').textContent = stats.lastVisit
    ? `Derniere visite : ${stats.lastVisit}` : '';

  // Cards Tigrou
  document.getElementById('tigWater').textContent = `${Math.round(stats2.totalWater)}g`;
  document.getElementById('tigVisits').textContent = stats2.visitsPerDay.toFixed(1);
  document.getElementById('tigDur').textContent = formatDuration(stats2.avgDuration);
  const tigMl = document.getElementById('tigMlKg');
  tigMl.textContent = stats2.mlKgDay.toFixed(1);
  tigMl.classList.add(hydrationColor(stats2.mlKgDay));
  document.getElementById('tigLast').textContent = stats2.lastVisit
    ? `Derniere visite : ${stats2.lastVisit}` : '';

  // Alertes
  renderAlerts(stats, stats2, sessions);

  // Graphique eau par jour
  renderWaterChart(valid);

  // Table sessions
  renderTable(sessions);

  // Subtitle
  document.getElementById('subtitle').textContent =
    `${sessions.length} sessions sur 7 jours | Mis a jour ${new Date().toLocaleString('fr-FR')}`;
  document.getElementById('content').style.display = 'block';
}

function computeStats(sessions, cat) {
  const filtered = sessions.filter(s => s.cat === cat);
  if (filtered.length === 0) {
    return {
      totalWater: 0, visitsPerDay: 0, avgDuration: 0,
      mlKgDay: 0, lastVisit: null,
    };
  }

  const totalWater = filtered.reduce((sum, s) => sum + (s.delta_g || 0), 0);
  const visitsPerDay = filtered.length / 7;
  const avgDuration = filtered.reduce((sum, s) => sum + (s.duration_s || 0), 0) / filtered.length;
  const mlKgDay = (totalWater / 7) / CAT_WEIGHTS[cat];

  // Derniere visite (les sessions sont deja triees DESC)
  const last = filtered[0];
  const lastDt = formatDateTime(last.start_time);
  const lastVisit = `${lastDt.date} a ${lastDt.time}`;

  return { totalWater, visitsPerDay, avgDuration, mlKgDay, lastVisit };
}

function renderAlerts(papStats, tigStats, allSessions) {
  const container = document.getElementById('alertsContainer');
  container.innerHTML = '';

  // Hydratation anormale
  function checkHydration(stats, name) {
    if (stats.mlKgDay >= HYDRATION_VIGILANCE) {
      addAlert(`${name} : hydratation elevee (${stats.mlKgDay.toFixed(1)} ml/kg/jour) - polydipsie possible`, 'alert');
    } else if (stats.mlKgDay > 0 && stats.mlKgDay < HYDRATION_NORMAL_LOW) {
      addAlert(`${name} : hydratation faible (${stats.mlKgDay.toFixed(1)} ml/kg/jour)`, 'alert-info');
    }
  }
  checkHydration(papStats, 'Papouille');
  checkHydration(tigStats, 'Tigrou');

  // Sessions erreur balance
  const nbErreurs = allSessions.filter(s => s.is_error || s.cat === 'erreur').length;
  if (nbErreurs > 0) {
    addAlert(`${nbErreurs} session(s) marquee(s) comme erreur balance (delta > 100g)`, 'alert-info');
  }

  // Sessions incertaines
  const nbIncertain = allSessions.filter(s => s.cat === 'incertain').length;
  if (nbIncertain > 0) {
    addAlert(`${nbIncertain} session(s) incertaine(s) a relabel manuel`, 'alert-info');
  }

  if (container.children.length === 0) {
    addAlert('Tout va bien : aucune anomalie detectee', 'alert-ok');
  }
}

function addAlert(text, cls) {
  const div = document.createElement('div');
  div.className = `alert ${cls === 'alert' ? '' : cls}`;
  div.innerHTML = `<div class="alert-icon"></div><div>${text}</div>`;
  document.getElementById('alertsContainer').appendChild(div);
}

function renderWaterChart(validSessions) {
  // Aggreger par jour x chat
  const byDay = {};
  validSessions.forEach(s => {
    const day = s.start_time.slice(0, 10);
    if (!byDay[day]) byDay[day] = { papouille: 0, tigrou: 0 };
    if (s.cat === 'papouille' || s.cat === 'tigrou') {
      byDay[day][s.cat] += (s.delta_g || 0);
    }
  });

  // Construire les 7 derniers jours en ordre chronologique
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 24 * 60 * 60 * 1000);
    days.push(d.toISOString().slice(0, 10));
  }

  const papData = days.map(d => Math.round(byDay[d]?.papouille || 0));
  const tigData = days.map(d => Math.round(byDay[d]?.tigrou || 0));

  new Chart(document.getElementById('waterDailyChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: days.map(d => d.slice(5)),
      datasets: [
        { label: 'Papouille', data: papData, backgroundColor: PAP + 'cc', borderRadius: 4 },
        { label: 'Tigrou', data: tigData, backgroundColor: TIG + 'cc', borderRadius: 4 },
      ],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: tickColor, callback: v => v + 'g' },
          grid: { color: gridColor },
        },
        x: { ticks: { color: tickColor }, grid: { display: false } },
      },
    },
  });
}

function renderTable(sessions) {
  const body = document.getElementById('tableBody');
  body.innerHTML = '';

  sessions.forEach(s => {
    const dt = formatDateTime(s.start_time);
    const tr = document.createElement('tr');

    let catTag = `<span class="cat-tag cat-${s.cat}">${s.cat}</span>`;
    if (s.is_error) catTag = `<span class="cat-tag cat-erreur">erreur</span>`;

    tr.innerHTML = `
      <td>${dt.date}</td>
      <td>${dt.time}</td>
      <td>${catTag}</td>
      <td>${formatDuration(s.duration_s)}</td>
      <td>${Math.round(s.delta_g || 0)}g</td>
      <td>${s.certainty || '-'}</td>
    `;
    body.appendChild(tr);
  });
}

// Lancement
loadSessions();
</script>

</body>
</html>
