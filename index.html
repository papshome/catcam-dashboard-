<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>CatCam</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            cream:  { 50: '#FDFBF7', 100: '#FAF7F2', 200: '#F2EDE4', 300: '#E8E1D3' },
            ink:    { 900: '#1F1B16', 700: '#4A433A', 500: '#7A7368', 400: '#9A9285' },
            calm:   { 50: '#EEF4EF', 200: '#C9DDCC', 500: '#7BA889', 700: '#4F7A5D' },
            amber2: { 50: '#FBF3E4', 200: '#F0DDB0', 500: '#D9A95E', 700: '#A17526' },
            rose:   { 500: '#C86C6C', 700: '#8C4343' },
          },
        },
      },
    };
  </script>

  <style>
    html, body { background: #FAF7F2; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #1F1B16; -webkit-font-smoothing: antialiased; }

    .viewport { max-width: 440px; margin: 0 auto; min-height: 100vh; }

    /* ---- Header brand ---- */
    .brand-logo {
      height: 32px;
      width: auto;
      display: block;
      user-select: none;
    }
    .fountain-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 11px 6px 9px;
      background: #F2EDE4; border: 1px solid #E8E1D3;
      border-radius: 999px;
      font-size: 12px; font-weight: 700; color: #1F1B16;
      letter-spacing: -0.01em;
    }
    .fountain-pill .drop { width: 14px; height: 14px; flex-shrink: 0; color: #7BA889; }
    .fountain-pill.low    .drop { color: #D9A95E; }
    .fountain-pill.empty  .drop { color: #C86C6C; }
    .fountain-pill.low    { background: #FBF3E4; border-color: #F0DDB0; color: #A17526; }
    .fountain-pill.empty  { background: #F6E2E2; border-color: #EBC5C5; color: #8C4343; }
    .avatar-btn {
      width: 44px; height: 44px; border-radius: 999px;
      background: #F2EDE4; display: flex; align-items: center; justify-content: center;
      color: #4A433A; flex-shrink: 0; border: 1px solid #E8E1D3;
    }
    .avatar-btn:hover { background: #E8E1D3; }

    /* ---- Cat cards ---- */
    .cat-card {
      background: #fff;
      border-radius: 28px;
      padding: 20px 20px 16px;
      box-shadow: 0 1px 2px rgba(31,27,22,.03), 0 8px 24px rgba(31,27,22,.05);
      display: block;
      color: inherit;
      text-decoration: none;
      position: relative;
      transition: box-shadow .18s ease;
    }
    .cat-card:hover {
      box-shadow: 0 2px 6px rgba(31,27,22,.06), 0 16px 32px rgba(31,27,22,.07);
    }
    .cat-card:active { transform: translateY(1px); }
    .cat-chevron-icon {
      color: #BCB3A4;
      opacity: 0.55;
      flex-shrink: 0;
      transition: transform .18s ease, opacity .15s ease;
    }
    .cat-card:hover .cat-chevron-icon {
      opacity: 0.95;
      transform: translateX(3px);
    }
    .cat-card + .cat-card { margin-top: 14px; }
    .cat-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .cat-head-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .cat-avatar {
      width: 48px; height: 48px; border-radius: 999px; flex-shrink: 0;
      background: #F2EDE4 center/cover no-repeat;
      box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px #E8E1D3;
    }
    .cat-avatar.skeleton { background-color: #F2EDE4; }
    .cat-name { font-size: 19px; font-weight: 700; color: #1F1B16; letter-spacing: -0.01em; line-height: 1.1; }
    .cat-sub {
      font-size: 12.5px; color: #7A7368; margin-top: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .cat-sub .dot { width: 6px; height: 6px; border-radius: 999px; background: #7BA889; flex-shrink: 0; }
    .cat-sub .dot.watch { background: #D9A95E; }
    .cat-sub .dot.off { background: #9A9285; }

    .cat-value {
      text-align: right; flex-shrink: 0;
    }
    .cat-value .num {
      font-size: 34px; font-weight: 700; color: #1F1B16;
      letter-spacing: -0.03em; line-height: 1;
    }
    .cat-value .unit { font-size: 15px; font-weight: 500; color: #7A7368; margin-left: 2px; }
    .cat-value .label {
      font-size: 10.5px; color: #9A9285; margin-top: 4px;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    }

    .cat-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; font-size: 12px; color: #7A7368;
    }
    .cat-meta b { color: #1F1B16; font-weight: 600; }

    /* ---- Body : chart full width ---- */
    .cat-body {
      margin-top: 14px;
    }

    /* ---- Chart area ---- */
    .chart-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 128px;
      display: flex;
      flex-direction: column;
    }
    .plot-row {
      flex: 1 1 auto;
      display: flex;
      gap: 4px;
      min-height: 0;
    }
    .y-axis {
      width: 22px;
      flex-shrink: 0;
      position: relative;
      pointer-events: none;
    }
    .y-axis .y-unit {
      position: absolute; top: 0; right: 0;
      font-size: 9px; color: #9A9285; font-weight: 600;
      text-transform: lowercase; letter-spacing: 0.02em;
    }
    .y-axis .y-tick {
      position: absolute; right: 0;
      transform: translateY(-50%);
      font-size: 9.5px; color: #9A9285; font-weight: 500;
      white-space: nowrap;
    }
    .chart-plot {
      flex: 1 1 auto;
      position: relative;
      min-width: 0;
      min-height: 0;
    }
    .chart-plot svg { display: block; width: 100%; height: 100%; }
    .avg-label {
      position: absolute;
      left: 4px;
      transform: translateY(-50%);
      font-size: 10px; color: #4A433A;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 2px 7px; border-radius: 8px;
      font-weight: 600; pointer-events: none;
      border: 1px solid rgba(242,237,228,0.6);
      white-space: nowrap;
      z-index: 2;
    }
    .today-pill {
      position: absolute;
      transform: translateY(calc(-100% - 10px));
      background: rgba(31,27,22,0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #fff;
      font-size: 10.5px; font-weight: 600;
      padding: 3px 9px; border-radius: 999px;
      pointer-events: none; white-space: nowrap;
      z-index: 3; letter-spacing: 0.01em;
    }
    .day-dot {
      position: absolute;
      width: 7px; height: 7px;
      border-radius: 999px;
      transform: translate(50%, -50%);
      pointer-events: none;
      z-index: 1;
      box-sizing: border-box;
      border: 1.5px solid #fff;
    }
    .day-dot.today { z-index: 2; }
    .day-labels {
      position: relative;
      height: 16px;
      flex-shrink: 0;
      margin-top: 6px;
      padding-left: 26px; /* aligne avec le chart-plot (y-axis 22 + gap 4) */
    }
    .day-labels span {
      position: absolute;
      transform: translateX(50%);
      font-size: 11px; color: #9A9285; font-weight: 500;
      white-space: nowrap;
    }
    .day-labels span.today { color: #1F1B16; font-weight: 600; }

    /* ---- Section labels ---- */
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: #9A9285;
    }
    .link-soft { font-size: 12px; color: #7A7368; }
    .link-soft:hover { color: #1F1B16; }

    /* ---- Recent sessions list ---- */
    .recent-list {
      background: #fff; border-radius: 22px; overflow: hidden;
      box-shadow: 0 1px 2px rgba(31,27,22,.03), 0 6px 18px rgba(31,27,22,.04);
    }
    .recent-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px 12px 12px;
      color: inherit; text-decoration: none;
      transition: background-color .12s ease;
    }
    .recent-item + .recent-item { border-top: 1px solid #F2EDE4; }
    .recent-item:hover  { background: #FAF7F2; }
    .recent-item:active { background: #F2EDE4; }
    .ls-cover {
      width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0;
      background-size: cover; background-position: center; background-color: #F2EDE4;
    }
    .ls-title { font-size: 15px; font-weight: 600; color: #1F1B16; line-height: 1.2; }
    .ls-sub   { font-size: 12px; color: #7A7368; margin-top: 3px; }
    .ls-chev  { color: #9A9285; padding-right: 4px; flex-shrink: 0; }
    .recent-empty {
      padding: 22px 16px; text-align: center;
      font-size: 13px; color: #7A7368;
    }
    .recent-count {
      font-size: 11px; font-weight: 600; color: #9A9285;
      margin-left: 6px; letter-spacing: 0.02em; text-transform: none;
    }

    /* ---- Skeleton ---- */
    @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
    .skeleton {
      background: linear-gradient(90deg, #F2EDE4 0%, #FAF7F2 50%, #F2EDE4 100%);
      background-size: 400px 100%; animation: shimmer 1.4s infinite linear; border-radius: 12px;
    }

    /* ---- Bottom nav (conteneur blanc arrondi, type "pill bar") ---- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: linear-gradient(to top, rgba(250,247,242,.95) 55%, rgba(250,247,242,0));
      pointer-events: none;
    }
    .bottom-nav-inner {
      max-width: 440px; margin: 0 auto;
      padding: 10px 16px 16px;
      pointer-events: auto;
    }
    .bottom-nav-bar {
      background: #fff;
      border: 1px solid #F2EDE4;
      border-radius: 28px;
      box-shadow: 0 2px 6px rgba(31,27,22,.05), 0 14px 32px rgba(31,27,22,.07);
      padding: 8px 6px;
      display: flex; align-items: center; justify-content: space-around;
    }
    .bottom-nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 6px 4px; color: #9A9285; background: transparent; border: 0; cursor: pointer;
      border-radius: 18px; transition: color .15s ease, background-color .15s ease;
      position: relative;
    }
    .bottom-nav-btn:hover:not([disabled]) { color: #4A433A; }
    .bottom-nav-btn span { font-size: 10.5px; margin-top: 4px; font-weight: 500; letter-spacing: 0.01em; }
    .bottom-nav-btn.active { color: #1F1B16; background: #FAF7F2; }
    .bottom-nav-btn.active span { font-weight: 700; }
    .bottom-nav-btn.active svg { stroke-width: 2.4; }
  </style>
</head>

<body>

  <div class="viewport pb-28">

    <!-- Header (brand + fountain % + avatar) -->
    <header class="px-5 pt-6 pb-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="./assets/logo.png" alt="PurrSense" class="brand-logo" />
        <div id="fountain-pill" class="fountain-pill" style="display:none;" title="Niveau estime de la fontaine">
          <svg class="drop" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2.5c-.4 0-.77.18-1.02.5C8.9 5.58 4 12 4 15.5a8 8 0 0 0 16 0c0-3.5-4.9-9.92-6.98-12.5A1.3 1.3 0 0 0 12 2.5z"/>
          </svg>
          <span id="fountain-pct-text">--%</span>
        </div>
      </div>
      <button class="avatar-btn" aria-label="Reglages">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 22c0-4 4-7 8-7s8 3 8 7"></path>
        </svg>
      </button>
    </header>

    <!-- Cartes chats -->
    <section class="px-5 mt-3" id="cats-container">
      <div class="cat-card skeleton" style="height:220px;"></div>
      <div class="cat-card skeleton" style="height:220px; margin-top:14px;"></div>
    </section>

    <!-- Sessions des dernieres 24h -->
    <section class="px-5 mt-6">
      <div class="flex items-center justify-between mb-2 px-1">
        <h2 class="section-label">
          Dernieres 24h
          <span class="recent-count" id="recent-count"></span>
        </h2>
        <button class="link-soft" id="btn-see-timeline">Tout voir</button>
      </div>
      <div id="recent-list" class="recent-list">
        <div class="recent-empty">Chargement...</div>
      </div>
    </section>

    <p id="footer-info" class="text-center text-[11px] text-ink-400 mt-8 px-5"></p>

  </div>

  <!-- Bottom nav (conteneur blanc arrondi) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <div class="bottom-nav-bar">
      <button class="bottom-nav-btn active" aria-label="Accueil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 0-2-2h0a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Accueil</span>
      </button>
      <a class="bottom-nav-btn" href="./chat.html?id=papouille" aria-label="Chats">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <span>Chats</span>
      </a>
      <a class="bottom-nav-btn" href="./timeline.html" aria-label="Timeline">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Timeline</span>
      </a>
      <button class="bottom-nav-btn" aria-label="Reglages" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m10 0h6M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg>
        <span>Reglages</span>
      </button>
      </div>
    </div>
  </nav>

  <script src="./app.js"></script>
</body>
</html>
